<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Résilience 2060 — France</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F1EB;--white:#FAFAF8;--surface:#EDEAE2;--text:#1E1C18;--muted:#7A7567;--border:#D8D3C8;
}
html,body{height:100%;font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);font-size:13px}
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:54px;background:var(--white);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:8px 0;gap:2px;flex-shrink:0}
.logo{font-family:'Lora',serif;font-size:9px;font-weight:700;color:var(--muted);text-align:center;padding:5px 2px 9px;border-bottom:1px solid var(--border);width:100%;margin-bottom:3px;line-height:1.4;letter-spacing:.05em}
.tb{width:38px;height:38px;border-radius:8px;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;background:transparent;transition:background .15s;outline:none;position:relative}
.tb:hover,.tb.on{background:var(--surface)}
.tb .tip{display:none;position:absolute;left:46px;top:50%;transform:translateY(-50%);background:var(--text);color:#fff;font-size:10px;padding:3px 8px;border-radius:6px;white-space:nowrap;z-index:200;pointer-events:none}
.tb:hover .tip{display:block}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:var(--white);border-bottom:1px solid var(--border);padding:0 14px;height:48px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.topbar-title{font-family:'Lora',serif;font-size:14px;font-weight:700}
.topbar-sub{font-size:10px;color:var(--muted)}
.badge{background:var(--surface);color:var(--muted);font-size:10px;padding:3px 9px;border-radius:20px;border:1px solid var(--border);white-space:nowrap;max-width:200px;overflow:hidden;text-overflow:ellipsis;font-family:'JetBrains Mono',monospace}
.dept-sel{margin-left:auto;font-size:11px;border:1px solid var(--border);border-radius:6px;padding:4px 7px;background:var(--white);color:var(--text);cursor:pointer;outline:none}


/* CONTENT */
.content{flex:1;overflow:hidden;display:flex}
.pane{display:none;width:100%;height:100%;overflow:hidden;flex-direction:row}
.pane.on{display:flex}

/* MAP */
.map-col{flex:1;display:flex;flex-direction:column;padding:10px;gap:8px;overflow:hidden;min-width:0}
.dim-row{display:flex;gap:4px;flex-wrap:wrap}
.db{font-size:10px;padding:3px 10px;border-radius:20px;border:1px solid var(--border);background:var(--white);cursor:pointer;color:var(--muted);transition:all .15s;outline:none;font-family:'Inter',sans-serif}
.db:hover,.db.on{background:var(--surface);border-color:var(--text);color:var(--text)}
.map-wrap{flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden}
#fmap{max-height:100%;max-width:100%}
.dp{cursor:pointer;stroke:#fff;stroke-width:.4;transition:opacity .1s}
.dp:hover{opacity:.78;stroke:var(--text)!important;stroke-width:1.5!important}
.dp.sel{stroke:var(--text)!important;stroke-width:2.5!important}
.legend-row{display:flex;align-items:center;gap:6px;font-size:9px;color:var(--muted);padding:0 2px}
.lgd-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;width:100px}
.lgd-seg{flex:1}

/* TOOLTIP */
.tt{position:fixed;background:rgba(20,18,14,.88);color:#f5f0e8;font-size:11px;padding:5px 10px;border-radius:7px;pointer-events:none;display:none;z-index:999;white-space:nowrap;font-family:'Inter',sans-serif}

/* SIDE PANEL */
.sp{width:280px;border-left:1px solid var(--border);background:var(--white);overflow-y:auto;padding:16px;flex-shrink:0;scrollbar-width:thin}
.sp::-webkit-scrollbar{width:3px}
.sp::-webkit-scrollbar-thumb{background:var(--border)}
.sp-score{font-family:'Lora',serif;font-size:52px;font-weight:700;line-height:1}
.sp-name{font-family:'Lora',serif;font-size:18px;font-weight:600;margin-top:2px}
.sp-reg{font-size:10px;color:var(--muted);margin-top:1px;margin-bottom:3px}
.sp-rank{font-size:10px;font-weight:500;padding:2px 8px;border-radius:20px;display:inline-block;margin-bottom:12px;font-family:'JetBrains Mono',monospace}
.divider{border:none;border-top:1px solid var(--border);margin:10px 0}
.br{margin-bottom:6px;cursor:pointer}
.br:hover .br-label{text-decoration:underline;text-underline-offset:2px}
.br-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.br-label{font-size:10px;font-weight:500}
.br-val{font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace}
.br-bg{height:4px;background:var(--surface);border-radius:2px;overflow:hidden}
.br-fill{height:100%;border-radius:2px;transition:width .35s}
.sp-empty{color:var(--muted);font-size:11px;text-align:center;padding-top:45px;line-height:2}
.sp-sum{font-size:11px;line-height:1.75;color:var(--muted);margin-top:10px}
.sp-action{margin-top:14px;width:100%;padding:7px;border-radius:8px;border:1px solid var(--border);background:var(--surface);cursor:pointer;font-family:'Inter',sans-serif;font-size:11px;color:var(--text);transition:all .15s}
.sp-action:hover{background:var(--border)}

/* THEMATIC */
.th-lay{display:flex;width:100%;height:100%;overflow:hidden}
.th-left{flex:1;overflow-y:auto;padding:16px;scrollbar-width:thin}
.th-left::-webkit-scrollbar{width:3px}
.th-left::-webkit-scrollbar-thumb{background:var(--border)}
.th-right{width:210px;border-left:1px solid var(--border);background:var(--white);overflow-y:auto;padding:14px;flex-shrink:0;scrollbar-width:thin}
.th-right::-webkit-scrollbar{width:3px}
.th-right::-webkit-scrollbar-thumb{background:var(--border)}

/* CARDS */
.card{background:var(--white);border-radius:12px;padding:16px;border:1px solid var(--border);margin-bottom:12px}
.card h3{font-family:'Lora',serif;font-size:15px;font-weight:700;margin-bottom:10px}
.card h4{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin:10px 0 5px}
.card p{font-size:11px;line-height:1.8;color:#4a4535;margin-bottom:6px}

/* AI FICHE */
.fiche-wrap{background:var(--white);border-radius:12px;border:1px solid var(--border);margin-bottom:12px;overflow:hidden}
.fiche-header{padding:14px 16px 0}
.fiche-dept-head{display:flex;gap:12px;align-items:flex-start;margin-bottom:12px}
.fiche-score{font-family:'Lora',serif;font-size:44px;font-weight:700;line-height:1;flex-shrink:0}
.fiche-meta h2{font-family:'Lora',serif;font-size:18px;font-weight:700}
.fiche-meta .reg{font-size:10px;color:var(--muted)}
.fiche-rank{font-size:10px;font-weight:500;padding:2px 8px;border-radius:12px;display:inline-block;margin-top:4px;font-family:'JetBrains Mono',monospace}
.fiche-body{padding:0 16px 16px;font-size:11px;line-height:1.8;color:#3a3628}
.fiche-body h4{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin:10px 0 5px}
.fiche-body p{margin-bottom:6px}
.fiche-body ul{list-style:none;margin-bottom:8px}
.fiche-body ul.str li::before{content:"↗ ";color:#276749;font-weight:600}
.fiche-body ul.rsk li::before{content:"△ ";color:#9B4423}
.fiche-body .data-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin:8px 0}
.fiche-body .di{background:var(--surface);border-radius:6px;padding:8px}
.fiche-body .di .dv{font-family:'JetBrains Mono',monospace;font-size:16px;font-weight:500}
.fiche-body .di .dl{font-size:9px;color:var(--muted);margin-top:2px}
.fiche-body .src-note{font-size:9px;color:var(--muted);font-style:italic;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.fiche-tabs{display:flex;gap:0;border-bottom:1px solid var(--border);padding:0 16px;background:var(--surface)}
.fiche-tab{font-size:10px;padding:7px 11px;cursor:pointer;color:var(--muted);border-bottom:2px solid transparent;margin-bottom:-1px;font-family:'Inter',sans-serif;background:none;border-left:none;border-right:none;border-top:none;transition:color .15s}
.fiche-tab:hover{color:var(--text)}
.fiche-tab.on{color:var(--text);font-weight:600;border-bottom-color:var(--text)}

/* LOADING */
.loading{display:flex;align-items:center;gap:10px;padding:20px;color:var(--muted);font-size:11px}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--muted);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.streaming-text{font-size:11px;line-height:1.8;color:#3a3628;white-space:pre-wrap}

/* RANKING */
.rk-title{font-size:11px;font-weight:600;margin-bottom:8px;font-family:'Lora',serif}
.rk-sub{font-size:8px;color:var(--muted);margin:8px 0 4px;font-weight:600;letter-spacing:.07em;text-transform:uppercase}
.ri{display:flex;align-items:center;gap:5px;padding:3px 4px;border-radius:6px;cursor:pointer;transition:background .1s;margin-bottom:1px}
.ri:hover{background:var(--surface)}
.ri.on{background:#EEF0E8}
.rn{font-size:8px;color:var(--muted);width:13px;text-align:right;flex-shrink:0;font-family:'JetBrains Mono',monospace}
.rnm{font-size:10px;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rscore{font-size:10px;font-weight:600;font-family:'JetBrains Mono',monospace}

/* KPI */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-top:8px}
.kpi{border-radius:6px;padding:7px;text-align:center}
.kpi .kv{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:500}
.kpi .kl{font-size:9px;color:var(--muted);margin-top:2px;line-height:1.3}
.src-pills{display:flex;flex-wrap:wrap;gap:4px;margin-top:7px}
.pill{font-size:9px;padding:2px 7px;border-radius:20px;border:1px solid var(--border);color:var(--muted)}
.miss-box{background:#FFF8E1;border:1px solid #F6D860;border-radius:8px;padding:11px;margin-bottom:12px}
.miss-box h4{font-size:10px;font-weight:600;color:#7A5800;margin-bottom:4px}
.miss-box p{font-size:10px;color:#6B4E00;line-height:1.65}
.tab-intro{font-size:11px;line-height:1.8;color:var(--muted);border-left:2px solid var(--border);padding-left:10px;margin-bottom:12px}



/* ── MOBILE ─────────────────────────────────────────────────────────────── */
@media (max-width:768px){
  .app{flex-direction:column}
  .sidebar{width:100%;height:44px;flex-direction:row;padding:0 8px;gap:0;border-right:none;border-bottom:1px solid var(--border);overflow-x:auto;justify-content:flex-start}
  .logo{display:none}
  .tb{width:40px;height:40px;flex-shrink:0;border-radius:6px}
  .tb .tip{display:none!important}
  .topbar{height:auto;padding:8px 12px;flex-wrap:wrap;gap:6px}
  .topbar-title{font-size:13px}
  .topbar-sub{display:none}
  .badge{max-width:130px;font-size:9px}
  .dept-sel{font-size:10px;padding:3px 5px;max-width:110px}
  #p0{flex-direction:column}
  .map-col{padding:8px;gap:6px}
  .dim-row{flex-wrap:nowrap;overflow-x:auto;padding-bottom:2px;-webkit-overflow-scrolling:touch}
  .db{flex-shrink:0;font-size:9px;padding:2px 8px}
  .sp{width:100%;border-left:none;border-top:1px solid var(--border);max-height:42vh;padding:12px}
  .sp-score{font-size:36px}
  .sp-name{font-size:14px}
  .th-lay{flex-direction:column}
  .th-right{width:100%;border-left:none;border-top:1px solid var(--border);max-height:180px;overflow-y:auto;padding:10px}
  .th-left{padding:10px}
  .fiche-score{font-size:34px}
  .fiche-meta h2{font-size:14px}
  .kpi-row{grid-template-columns:repeat(2,1fr)!important}
}
@media (max-width:480px){
  .sp-score{font-size:30px}
  .topbar-title{font-size:12px}
}
</style>
</head>

  <button class="tb" data-i="8" onclick="sw(8)"><span>❓</span><span class="tip">Méthodologie</span></button>

  <button class="tb" data-i="1" onclick="sw(1)"><span>☀️</span><span class="tip">Climat 2060</span></button>
  <button class="tb" data-i="2" onclick="sw(2)"><span>💧</span><span class="tip">Ressource en eau</span></button>
  <button class="tb" data-i="3" onclick="sw(3)"><span>🌬️</span><span class="tip">Qualité de l'air</span></button>
  <button class="tb" data-i="4" onclick="sw(4)"><span>🌱</span><span class="tip">Sols</span></button>
  <button class="tb" data-i="5" onclick="sw(5)"><span>🫙</span><span class="tip">Alimentation & souveraineté</span></button>

</div>
<div class="main">
  <div class="topbar">
    <div>
      <div class="topbar-title">Résilience 2060 — Où vivre en France ?</div>
      <div class="topbar-sub">96 départements métropolitains · 6 dimensions environnementales · horizon 2060</div>
    </div>
    <div class="badge" id="bdg">← sélectionner un département</div>
    <select class="dept-sel" id="dsel" onchange="selCode(this.value)"><option value="">— Département —</option></select>
  </div>
  <div class="content">
    <div class="pane on" id="p0">
      <div class="map-col">
        <div class="dim-row">
          <button class="db on" data-d="g" onclick="sdim('g',this)">Score global</button>
          <button class="db" data-d="c" onclick="sdim('c',this)">☀️ Climat</button>
          <button class="db" data-d="e" onclick="sdim('e',this)">💧 Eau</button>
          <button class="db" data-d="a" onclick="sdim('a',this)">🌬️ Air</button>
          <button class="db" data-d="s" onclick="sdim('s',this)">🌱 Sols</button>
          <button class="db" data-d="al" onclick="sdim('al',this)">🫙 Alimentation</button>
          <button class="db" data-d="b" onclick="sdim('b',this)">🦋 Biodiversité</button>
        </div>
        <div class="map-wrap">
          <svg id="fmap" viewBox="0 0 600 560" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>
        <div class="legend-row">
          <span>1 — faible</span>
          <div class="lgd-bar" id="lgd"></div>
          <span>10 — élevé</span>
        </div>
      </div>
      <div class="sp" id="sp">
        <div id="sp-e" class="sp-empty">🗺️<br><br>Cliquez sur un département<br>pour voir son score<br>et générer sa fiche détaillée</div>
        <div id="sp-c" style="display:none">
          <div class="sp-score" id="sp-sc"></div>
          <div class="sp-name" id="sp-nm"></div>
          <div class="sp-reg" id="sp-rg"></div>
          <span class="sp-rank" id="sp-rk"></span>
          <hr class="divider">
          <div id="sp-bars"></div>
          <hr class="divider">
          <div class="sp-sum" id="sp-sm"></div>
          <button class="sp-action" id="sp-gen-btn" onclick="genFiche()">✦ Générer la fiche complète</button>
        </div>
      </div>
    </div>
    <div class="pane" id="p1"><div class="th-lay"><div class="th-left" id="tl1"></div><div class="th-right" id="tr1"></div></div></div>
    <div class="pane" id="p2"><div class="th-lay"><div class="th-left" id="tl2"></div><div class="th-right" id="tr2"></div></div></div>
    <div class="pane" id="p3"><div class="th-lay"><div class="th-left" id="tl3"></div><div class="th-right" id="tr3"></div></div></div>
    <div class="pane" id="p4"><div class="th-lay"><div class="th-left" id="tl4"></div><div class="th-right" id="tr4"></div></div></div>
    <div class="pane" id="p5"><div class="th-lay"><div class="th-left" id="tl5"></div><div class="th-right" id="tr5"></div></div></div>
    <div class="pane" id="p6"><div class="th-lay"><div class="th-left" id="tl6"></div><div class="th-right" id="tr6"></div></div></div>
    <div class="pane" id="p8"><div class="th-lay"><div class="th-left" id="tl8" style="max-width:820px"></div><div class="th-right" id="tr8" style="display:none"></div></div></div>
  </div>
</div>
</div>

function ssColor(s){

// Track generation requests to avoid stale DOM writes
const loadTokens={};

async function loadFiche(code, d, k, dimLabel, rank, ti){
  const token=Date.now();
  loadTokens[ti]=token;
  const cacheKey=`v6_${code}_${k}`;
  function writeIfCurrent(html){
    if(loadTokens[ti]!==token)return;
    const el=document.getElementById(`fiche-body-${ti}`);
    if(el)el.innerHTML=html;
  }
  try {
    const resp=await fetch(`/fiches/${code}_${k}.json`);
    if(!resp.ok){
      writeIfCurrent(`<div class="fiche-body"><p style="color:#C53030;padding:10px 0">Fiche non disponible.</p></div>`);
      return;
    }
    const parsed=await resp.json();
    ficheCache[cacheKey]=parsed;
    writeIfCurrent(renderFicheBody(parsed));
  } catch(e){
    writeIfCurrent(`<div class="fiche-body"><p style="color:#C53030;padding:10px 0">Erreur : ${e.message}</p></div>`);
  }
}

// ─── COLOR HELPERS ────────────────────────────────────────────────────────
function scColor(s){
  if(s>=8.5)return'#276749';if(s>=7)return'#38A169';if(s>=5.5)return'#D97706';if(s>=4)return'#C05621';return'#C53030';
}
function scBg(s){
  if(s>=8.5)return'#EFF6EC';if(s>=7)return'#F0FDF4';if(s>=5.5)return'#FFFBEB';if(s>=4)return'#FFF3E8';return'#FFF0F0';
}
function mapColor(s){
  const stops=[
    [196,100,80],  // 1: terracotta doux
    [210,158,80],  // 4: ambre chaud
    [140,175,95],  // 7: vert olive
    [55,110,65]    // 10: vert forêt
  ];
  const t=Math.max(0,Math.min(1,(s-1)/9));
  const seg=Math.min(2,Math.floor(t*3));
  const frac=(t*3)-seg;
  const c1=stops[seg],c2=stops[seg+1];
  return`rgb(${Math.round(c1[0]+(c2[0]-c1[0])*frac)},${Math.round(c1[1]+(c2[1]-c1[1])*frac)},${Math.round(c1[2]+(c2[2]-c1[2])*frac)})`;
}

<div style="padding-bottom:40px">

<div class="card" style="max-width:760px;margin-bottom:16px">
  <h3>Pourquoi ce dashboard ?</h3>
  <p>Ce tableau de bord vise à évaluer la <b>résilience environnementale</b> des 96 départements métropolitains à l'horizon 2060. Il ne s'agit pas d'un classement officiel mais d'une synthèse analytique croisant des sources publiques françaises et européennes, destinée à orienter une réflexion personnelle sur le <em>où vivre</em>.</p>
</div>

<div class="card" style="max-width:760px;margin-bottom:16px">
  <h3>Les 6 dimensions et leurs sources</h3>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:8px">
    <div style="background:var(--surface);border-radius:8px;padding:12px">
      <div style="font-weight:600;font-size:12px;margin-bottom:4px">☀️ Climat 2060</div>
      <p style="font-size:10px;margin-bottom:4px">Altitude (tampon thermique), exposition canicules, risque feux, vulnérabilité côtière. <b>Seule dimension avec projections quantitatives.</b></p>
      <div style="font-size:9px;color:var(--muted);font-style:italic">Météo-France TRACC 2024 · DRIAS · Explore2 BRGM/INRAE 2022 · AP3C Massif Central</div>
    </div>
    <div style="background:var(--surface);border-radius:8px;padding:12px">
      <div style="font-weight:600;font-size:12px;margin-bottom:4px">💧 Eau</div>
      <p style="font-size:10px;margin-bottom:4px">État écologique des masses d&#39;eau (DCE), nitrates, PFAS, stress hydrique projeté (Explore2).</p>
      <div style="font-size:9px;color:var(--muted);font-style:italic">BRGM Explore2 · Agence eau · ARS · SDES 2024</div>
    </div>
    <div style="background:var(--surface);border-radius:8px;padding:12px">
      <div style="font-weight:600;font-size:12px;margin-bottom:4px">🌬️ Air</div>
      <p style="font-size:10px;margin-bottom:4px">PM2,5 et NO₂ vs valeurs guides OMS 2021, sites Seveso, densité industrielle, émissions NH₃ agricoles.</p>
      <div style="font-size:9px;color:var(--muted);font-style:italic">ATMO France réseau · OMS 2021 · Citepa · Santé Publique France 2023</div>
    </div>
    <div style="background:var(--surface);border-radius:8px;padding:12px">
      <div style="font-weight:600;font-size:12px;margin-bottom:4px">🌱 Sols</div>
      <p style="font-size:10px;margin-bottom:4px">Sites ex-BASOL, résidus pesticides (INRAE 2023 : 98% des sites contaminés), risque radon (IRSN), % SAU bio.</p>
      <div style="font-size:9px;color:var(--muted);font-style:italic">GéoRisques ex-BASOL nov.2024 · INRAE Froger et al. 2023 · IRSN · Agence Bio 2023</div>
    </div>
    <div style="background:var(--surface);border-radius:8px;padding:12px">
      <div style="font-weight:600;font-size:12px;margin-bottom:4px">🫙 Alimentation</div>
      <p style="font-size:10px;margin-bottom:4px">Classement ZAVA 2024 (autonomie alimentaire locale), AOP/IGP, part SAU en agriculture biologique, circuits courts.</p>
      <div style="font-size:9px;color:var(--muted);font-style:italic">ZAVA Manger Local 2024 · INAO · Agence Bio 2023 · Agreste 2020</div>
    </div>
    <div style="background:var(--surface);border-radius:8px;padding:12px">
      <div style="font-weight:600;font-size:12px;margin-bottom:4px">🦋 Biodiversité</div>
      <p style="font-size:10px;margin-bottom:4px">Part Natura 2000 (%), parcs nationaux et régionaux, espèces emblématiques, état des corridors écologiques.</p>
      <div style="font-size:9px;color:var(--muted);font-style:italic">OFB Chiffres clés 2024 · INPN PatriNat · UICN-MNHN 2023 · LPO</div>
    </div>
  </div>
</div>

<div class="card" style="max-width:760px;margin-bottom:16px">
  <h3>Comment les scores sont calculés</h3>
  <p>Chaque dimension est notée de <b>1 à 10</b> sur une base <b>comparative</b> entre les 96 départements. Le score n&#39;est pas absolu mais relatif : un 9/10 signifie que le département est parmi les meilleurs de France pour cette dimension, pas qu&#39;il est parfait en valeur absolue.</p>
  <p>Le <b>score global est une moyenne simple</b> des 6 dimensions, pondération égale. C&#39;est un choix délibéré et discutable — on pourrait légitimement accorder plus de poids au climat à horizon 2060. Cette pondération est un parti pris transparent.</p>
  <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:10px">
    ${[['≥ 8,5','#EFF6EC','#276749','Très résilient'],['≥ 7,0','#F0FDF4','#38A169','Résilient'],['≥ 5,5','#FFFBEB','#D97706','Intermédiaire'],['≥ 4,0','#FFF3E8','#C05621','Fragile'],['< 4,0','#FFF0F0','#C53030','Très fragile']].map(([v,bg,c,l])=>
      `<span style="background:${bg};color:${c};padding:3px 10px;border-radius:20px;font-size:10px;font-weight:600">${v} — ${l}</span>`).join('')}
  </div>
</div>

<div class="card" style="max-width:760px;margin-bottom:16px;border-color:#F6D860;background:#FFFDF0">
  <h3 style="color:#7A5800">☀️ Seul le climat est une projection — pourquoi ?</h3>
  <p>Le changement climatique est le seul facteur pour lequel des <b>projections quantitatives fiables à l&#39;échelle départementale existent</b> (Météo-France TRACC, BRGM Explore2). La physique du climat obéit à des lois naturelles modélisables indépendamment des choix politiques.</p>
  <p>Les 5 autres dimensions reflètent la <b>situation actuelle</b> et sont <b>fondamentalement dépendantes des choix politiques futurs</b> :</p>
  <ul style="list-style:none;font-size:11px;line-height:1.9;margin:10px 0">
    <li style="padding:5px 0 5px 12px;border-left:2px solid #F6D860;margin-bottom:6px"><b>Eau</b> — Les nitrates et PFAS reflètent des politiques agricoles et industrielles actuelles. La Directive Eau EU (révision 2027) et les zones vulnérables nitrates peuvent radicalement changer la donne.</li>
    <li style="padding:5px 0 5px 12px;border-left:2px solid #F6D860;margin-bottom:6px"><b>Air</b> — Les PM2,5 ont déjà baissé de 30% depuis 2000 grâce aux politiques industrielles. La révision de la directive européenne qualité de l&#39;air (2030) va renforcer les contraintes sur tous les territoires.</li>
    <li style="padding:5px 0 5px 12px;border-left:2px solid #F6D860;margin-bottom:6px"><b>Sols</b> — La contamination aux pesticides peut s&#39;améliorer avec la transition bio (objectif 25% SAU bio en 2030). Les 11 016 sites BASOL sont en cours de dépollution progressive.</li>
    <li style="padding:5px 0 5px 12px;border-left:2px solid #F6D860;margin-bottom:6px"><b>Alimentation</b> — L&#39;autonomie alimentaire dépend des politiques de la PAC, des circuits courts et des choix de consommation — tous réversibles et très évolutifs.</li>
    <li style="padding:5px 0 5px 12px;border-left:2px solid #F6D860"><b>Biodiversité</b> — La trajectoire dépend de l&#39;atteinte de l&#39;objectif 30×30 (30% territoire protégé d&#39;ici 2030) et du règlement européen de restauration de la nature (adopté 2024).</li>
  </ul>
  <p style="margin-top:6px;font-size:11px"><b>Un territoire fragile aujourd&#39;hui sur l&#39;eau ou les sols peut s&#39;améliorer considérablement d&#39;ici 2060</b> avec des politiques volontaristes. À l&#39;inverse, un territoire solide peut se dégrader sans action.</p>
</div>

<div class="card" style="max-width:760px;margin-bottom:16px;border-color:#fca5a5;background:#FFF8F8">
  <h3 style="color:#991B1B">⚠️ Limites honnêtes de cette analyse</h3>
  <ul style="list-style:none;font-size:11px;line-height:1.85">
    <li style="margin-bottom:9px"><b>Granularité</b> — Le département masque des disparités intra-territoriales majeures. La Lozère est exemplaire en altitude, mais ses vallées touristiques subissent des pressions différentes. Un score 8,8 global cache des hétérogénéités importantes.</li>
    <li style="margin-bottom:9px"><b>Données incomplètes</b> — PFAS mesurés dans 40% des captages seulement (ANSES 2024). PM2,5 sans station permanente dans plusieurs départements ruraux (Lozère, Ariège, Aude, Lot en 2023). Listes rouges UICN couvrant surtout vertébrés et plantes.</li>
    <li style="margin-bottom:9px"><b>Pondération arbitraire</b> — La moyenne simple des 6 dimensions est un choix. Une pondération plus forte sur le Climat (30-40%) changerait significativement le classement final, notamment pour les départements d&#39;altitude.</li>
    <li style="margin-bottom:9px"><b>Absence de dimensions socio-économiques</b> — Ce dashboard n&#39;intègre pas le coût de la vie, l&#39;accès aux soins, l&#39;emploi, la qualité des logements ou les transports — facteurs essentiels pour une décision réelle de lieu de vie.</li>
    <li style="margin-bottom:9px"><b>Fiches IA</b> — Les fiches générées par l&#39;API Claude sont indicatives. Le modèle peut contenir des données légèrement datées ou des approximations. Les sources citées doivent être vérifiées directement.</li>
    <li><b>ZAVA 2024</b> — Le classement alimentaire ZAVA est propriétaire, sa méthodologie n&#39;est pas publiée en open data. Les scores alimentaires sont donc moins robustes que les autres dimensions.</li>
  </ul>
</div>

        <div style="font-size:9px;color:#4A5568;font-family:'JetBrains Mono',monospace">${u}</div>
      </div>`).join('')}
  </div>
</div>

</div>`;
}

function genFiche(){
  if(!selDept)return;
  const key=getKey();
  if(!key){openModal();return;}
  sw(1);
}
window.genFiche=genFiche;

// ─── POPULATE SELECT ─────────────────────────────────────────────────────
function populateSel(){
  const sel=document.getElementById('dsel');
  Object.entries(SCORES).sort((a,b)=>a[1].nom.localeCompare(b[1].nom,'fr')).forEach(([code,d])=>{
    const o=document.createElement('option');
    o.value=code;o.textContent=`${code} — ${d.nom}`;
    sel.appendChild(o);
  });
}

// ─── INIT ─────────────────────────────────────────────────────────────────
function init(){
  buildMap();
  populateSel();
  updateKeyBtn();
  for(let i=1;i<=6;i++)renderTab(i,null);
  // Start on methodology tab
  sw(8);
  // Pre-select Lozère so map is ready when user switches to it
  selDept='48';
  document.getElementById('bdg').textContent='48 — Lozère';
  document.getElementById('dsel').value='48';
  const p=document.querySelector('.dp[data-code="48"]');
  if(p)p.classList.add('sel');
}
init();
